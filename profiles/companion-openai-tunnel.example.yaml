config_version: 1
control_plane:
  base_url: "https://api.openai.com"
  tunnel_id: "tunnel_REPLACE_WITH_YOUR_TUNNEL_ID"
  api_key: "env:CONTROL_PLANE_API_KEY"
health:
  listen_addr: "127.0.0.1:8789"
admin_ui:
  open_browser: true
log:
  level: info
  format: json
mcp:
  server_urls:
    - channel: main
      url: "http://127.0.0.1:8788/mcp"
